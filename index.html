瘟神不注意时将那包瘟药全部吞掉。\\n带原瘟疫的毒药进入池梦彪腹中，药性发作，随即满脸变黑，两眼突出而亡。\\n瘟神带着池梦彪的魂魄晋见玉皇大帝，玉皇大帝感念他爱民救民的精神，敕封池梦彪为代天巡狩，六月十八日为圣诞千秋。&quot;,536870960]],[&quot;^16&quot;,[458,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[458,&quot;^F&quot;,460,536870960]],[&quot;^16&quot;,[458,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[458,&quot;^V&quot;,466,536870960]],[&quot;^16&quot;,[458,&quot;^U&quot;,97,536870960]],[&quot;^16&quot;,[458,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[458,&quot;^U&quot;,456,536870960]],[&quot;^16&quot;,[458,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[458,&quot;^;&quot;,&quot;~u63188a07-905f-45c6-a521-3cd4ce5bd054&quot;,536870960]],[&quot;^16&quot;,[459,&quot;^R&quot;,&quot;帕爾瓦蒂 #神话&quot;,536870960]],[&quot;^16&quot;,[459,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[459,&quot;^F&quot;,466,536870960]],[&quot;^16&quot;,[459,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[459,&quot;^V&quot;,455,536870960]],[&quot;^16&quot;,[459,&quot;^U&quot;,186,536870960]],[&quot;^16&quot;,[459,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[459,&quot;^H&quot;,186,536870960]],[&quot;^16&quot;,[459,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[459,&quot;^;&quot;,&quot;~u63188a07-3ae1-44df-adcd-8213f1ec6889&quot;,536870960]],[&quot;^16&quot;,[460,&quot;^R&quot;,&quot;陈留人，是唐朝的开国名将，也是常见于台湾庙宇所供奉的“池府千岁”，相传与下列将领李大亮、吴孝宽、朱叔裕、范承业为结拜兄弟，有关池梦彪的传说也很多，但是真的逝世日期却无法确定。&quot;,536870960]],[&quot;^16&quot;,[460,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[460,&quot;^F&quot;,466,536870960]],[&quot;^16&quot;,[460,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[460,&quot;^V&quot;,466,536870960]],[&quot;^16&quot;,[460,&quot;^U&quot;,97,536870960]],[&quot;^16&quot;,[460,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[460,&quot;^U&quot;,456,536870960]],[&quot;^16&quot;,[460,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[460,&quot;^;&quot;,&quot;~u63188a07-5f63-4041-a840-96f523ed5249&quot;,536870960]],[&quot;^16&quot;,[461,&quot;^R&quot;,&quot;![image.png](../assets/image_1659441583047_0.png)&quot;,536870960]],[&quot;^16&quot;,[461,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[461,&quot;^F&quot;,464,536870960]],[&quot;^16&quot;,[461,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[461,&quot;^V&quot;,459,536870960]],[&quot;^16&quot;,[461,&quot;^U&quot;,186,536870960]],[&quot;^16&quot;,[461,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[461,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[461,&quot;^;&quot;,&quot;~u63188a07-e030-4a7f-81f2-c30b93ac49fd&quot;,536870960]],[&quot;^16&quot;,[462,&quot;^R&quot;,&quot;雪山神女为雪山神（喜马拉雅山的人格化）的女儿，妹妹是恆河女神。按某些《往世书》的说法，她的前世是湿婆的第一个妻子娑提。娑提是生主之一的达刹的女儿，因其父反对其与湿婆结合而投火自焚（印度寡妇殉葬的习俗娑提即由此得名）。另一位大神毗湿奴為了勸阻悲傷的湿婆，将娑提的尸体切碎投向世界各地，后来转生为雪山神女。《梵转往世书》说娑提曾亲自对湿婆显灵，告知湿婆她将以雪山神的女儿之形态复活。&quot;,536870960]],[&quot;^16&quot;,[462,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[462,&quot;^F&quot;,457,536870960]],[&quot;^16&quot;,[462,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[462,&quot;^V&quot;,459,536870960]],[&quot;^16&quot;,[462,&quot;^U&quot;,186,536870960]],[&quot;^16&quot;,[462,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[462,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[462,&quot;^;&quot;,&quot;~u63188a07-1de4-414c-8a23-645bce1ea966&quot;,536870960]],[&quot;^16&quot;,[463,&quot;^R&quot;,&quot;爱神的行动失败后，为感动湿婆，雪山神女立志进行艰苦的修行。湿婆得知此事之後，就变成一个婆罗门前去试探雪山神女，在她面前拼命诋毁自己的本尊。但雪山神女全部驳斥了这些谎言。湿婆终于被打动了，于是与雪山神女结婚，不久生下了战神室建陀（即鸠摩罗，后来被与泰米尔人的神祇牟楼干混同）和羣主（象头神）。室建陀率领天兵天将消灭了多罗伽。羣主则因在出生喜宴时忘了邀请土星神娑尼，而被后者烧掉了头颅。梵天许诺说，雪山神女在林中看到的第一个动物的脑袋将长到她儿子脖子上。雪山神女看到了大象，于是儿子就长了一个象头。其它说法则认为切掉儿子头颅的是湿婆，羣主為了守護母親的浴室，擋住了回家的湿婆，湿婆一怒之下就斬首了對方，才發覺對方原來是自己的孩子，后来湿婆又为了不让雪山神女伤心，而去問毘濕奴讓愛子復活的方法。毗濕奴說，只要在樹林中看到第一個動物的頭顱，就將之梟首，回家安裝在羣主身上就行了，所以湿婆殺了一隻大象，让儿子长出了一个象头。&quot;,536870960]],[&quot;^16&quot;,[463,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[463,&quot;^F&quot;,465,536870960]],[&quot;^16&quot;,[463,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[463,&quot;^V&quot;,459,536870960]],[&quot;^16&quot;,[463,&quot;^U&quot;,186,536870960]],[&quot;^16&quot;,[463,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[463,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[463,&quot;^;&quot;,&quot;~u63188a07-55ff-459c-bd32-1d56fe84a603&quot;,536870960]],[&quot;^16&quot;,[464,&quot;^R&quot;,&quot;由于雪山神女象征着湿婆的黑色“性力”，因此雪山神女原本是拥有乌黑的肌肤。有一次湿婆抱着雪山神女时，湿婆打趣地说她的皮肤太黑，当她躺在他雪白的身上时，仿佛一条黑蛇爬上一棵檀香树。听到湿婆这样说她，自尊心很强的雪山神女非常生气，独自离开了喜马拉雅山，专心过起了苦行生活。最终她苦修成功，梵天赐予了她一身金色的肌肤。于是她身上脱落下来的黑色化为了迦梨女神（时母）。&quot;,536870960]],[&quot;^16&quot;,[464,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[464,&quot;^F&quot;,463,536870960]],[&quot;^16&quot;,[464,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[464,&quot;^V&quot;,459,536870960]],[&quot;^16&quot;,[464,&quot;^U&quot;,186,536870960]],[&quot;^16&quot;,[464,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[464,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[464,&quot;^;&quot;,&quot;~u63188a07-8a81-4300-982d-9af3ebb3c480&quot;,536870960]],[&quot;^16&quot;,[465,&quot;^R&quot;,&quot;雪山神女转世后仍然热恋湿婆，并为了引起湿婆的注意而迁居到其修行地吉罗娑山（即冈仁波齐峰）上。但湿婆一心修行，对她不理不睬。其实这一结合还有更重要的实际目的，那就是希望湿婆能生出铲除阿修罗的孩子，以消灭强大的阿修罗王多罗伽。多罗伽虔敬地崇拜梵天，因此被梵天授予了无敌的力量（按湿婆往世书，梵天赐福给多罗伽，並預言他只能被湿婆的儿子打败，而湿婆并没有儿子）。甚至连大神毗湿奴都拿他没办法，毗湿奴曾与多罗伽大战了两万年，也无法将之消灭。众神只好希望雪山神女能为湿婆生一个儿子，于是派爱神伽摩去撮合他们。结果湿婆因修行被打扰而发怒，从额头上的第三只眼中喷出神火把爱神烧成了灰。后来经爱神的妻子哀求，湿婆才将爱神复活，但是愛神從此變成無形無相。&quot;,536870960]],[&quot;^16&quot;,[465,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[465,&quot;^F&quot;,462,536870960]],[&quot;^16&quot;,[465,&quot;^Y&quot;,455,536870960]],[&quot;^16&quot;,[465,&quot;^V&quot;,459,536870960]],[&quot;^16&quot;,[465,&quot;^U&quot;,186,536870960]],[&quot;^16&quot;,[465,&quot;^U&quot;,455,536870960]],[&quot;^16&quot;,[465,&quot;^1:&quot;,true,536870960]],[&quot;^16&quot;,[465,&quot;^;&quot;,&quot;~u63188a07-05d6-4346-843c-6470c7a3eb41&quot;,536870960]],[&quot;^16&quot;,[466,&quot;^R&quot;,&quot;池梦彪 #人物 #传说&quot;,536870960]],[&quot;^16&quot;,[466,&quot;^P&quot;,&quot;^19&quot;,536870960]],[&quot;^16&quot;,[466,&quo 学体系之后的第二次飞跃。康德通过对自在之物和现象的严格区分，发展出认识论的先验自我意识统摄机能和道德实践领域的纯粹理性，以及沟通两者的判断力批判。黑格尔通过辩证法三段论将整个世界容纳在绝对精神从自在状态过渡到自为状态，最终达成绝对理性自我意识的宏大历史过程。因此，黑格尔成为最后一个形而上学大体系，并引发费尔巴哈和马克思对其的反思。&quot;,536870986]],[&quot;^16&quot;,[603,&quot;^P&quot;,&quot;^19&quot;,536870986]],[&quot;^16&quot;,[603,&quot;^F&quot;,630,536870986]],[&quot;^16&quot;,[603,&quot;^Y&quot;,581,536870986]],[&quot;^16&quot;,[603,&quot;^V&quot;,611,536870986]],[&quot;^16&quot;,[603,&quot;^U&quot;,580,536870986]],[&quot;^16&quot;,[603,&quot;^U&quot;,581,536870986]],[&quot;^16&quot;,[603,&quot;^1:&quot;,true,536870986]],[&quot;^16&quot;,[603,&quot;^;&quot;,&quot;~u63188a07-099b-4d82-8750-55a7236f9413&quot;,536870986]],[&quot;^16&quot;,[604,&quot;^R&quot;,&quot;雅典的梭伦（Solon of Athens），他的格言相传是“避免极端”（Nothing in excess）。\\n斯巴达的契罗（Chilon of Sparta），他的格言相传是“莫妄想不可能之事”（Do not desire the impossible）或“认识你自己”（first Know yourself）。\\n米利都的泰勒斯（Thales of Miletus），他的格言相传是“只在乎稳定会带来毁灭”（To bring surety brings ruin）或“认识你自己”（Know thyself）。\\n普里耶涅的毕阿斯（Bias of Priene），他的格言相传有“人多反而坏事”（Too many workers spoil the work）、“多数人皆恶人”（Most men are bad）。\\n林度斯的克莱俄布卢（英语：Cleobulus）（Cleobulus of Lindos），他的格言相传是“适度即至善”（Moderation is the chief good）。\\n米蒂利尼的庇塔库斯（Pittacus of Mitylene），他的格言相传是“认清你的时机”（Know thine opportunity）。\\n科林斯的佩里安德（Periander of Corinth），他的格言相传是“事事都应做长远考虑”（Forethought in all things）。&quot;,536870986]],[&quot;^16&quot;,[604,&quot;^P&quot;,&quot;^19&quot;,536870986]],[&quot;^16&quot;,[604,&quot;^F&quot;,596,536870986]],[&quot;^16&quot;,[604,&quot;^Y&quot;,581,536870986]],[&quot;^16&quot;,[604,&quot;^V&quot;,585,536870986]],[&quot;^16&quot;,[604,&quot;^U&quot;,97,536870986]],[&quot;^16&quot;,[604,&quot;^U&quot;,580,536870986]],[&quot;^16&quot;,[604,&quot;^U&quot;,581,536870986]],[&quot;^16&quot;,[604,&quot;^1:&quot;,true,536870986]],[&quot;^16&quot;,[604,&quot;^;&quot;,&quot;~u63188a07-1e1d-4254-abbc-bb23ee533120&quot;,536870986]],[&quot;^16&quot;,[605,&quot;^R&quot;,&quot;巧饼&quot;,536870986]],[&quot;^16&quot;,[605,&quot;^P&quot;,&quot;^19&quot;,
